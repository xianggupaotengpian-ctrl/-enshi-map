            var html_e2d53b34eb4d48233f6a69781bb231b0 = $(`<div id="html_e2d53b34eb4d48233f6a69781bb231b0" style="width: 100.0%; height: 100.0%;">     <b>恩施土家族苗族自治州利川市柏杨坝镇水井村</b><br>     <b>⭐ 星级：</b> ⭐⭐⭐⭐<br>     <b>🍃 茶种植：</b> 传统茶区<br>     <b>👥 民族文化：</b> 土家族<br>     <b>📞 联系方式：</b><br>利川市柏杨坝镇人民政府<br>办公地址:利川市柏杨坝镇光明路28号<br>办公时间:工作日上午8:30-12:00，下午2:30-5:30<br>座机电话:0718-7641155<br>传真号码:0718-7641799<br>负责人姓名:陈祥<br>     <b>📝 描述：</b><br>柏杨坝镇<br>柏杨坝镇因辖区古时生长着茂密的柏杨树得名。隶属于湖北省恩施土家族苗族自治州利川市，地处利川市西北部，东与重庆市奉节县和恩施州恩施市交界，南与凉雾乡、团堡镇相邻，西与南坪乡、谋道镇、重庆市云阳县接壤，北与重庆市奉节县毗邻，镇人民政府距利川市区30千米。<br>区域总面积579.93平方千米，截至2019年末，柏杨坝镇户籍人口为88840人。<br><br>沿革：<br>明洪武十四年（1381年），实行邻保制。清乾隆以后，改为保甲制，属奉节县南岸第七指导区。中华人民共和国成立后，为奉节县第八区。1950年2月，划归利川县为第三区。1955年，为利川第四区（柏杨）。1956年，柏杨与龙门合并为柏杨区。1958年，改为柏杨公社。1960年，为柏杨区。<br>1975年，为柏杨公社。1980年，改名柏杨坝公社。1984年，改柏杨坝区。1990年，辖区马坪乡划归南坪区管辖。1996年，撤区建镇。<br>形势：<br>柏杨坝镇境内属大巴山脉，地势略为东高西低、南高北低，海拔1000~1200米。境内最高峰位于寒池山主峰，海拔2041.5米；最低点位于鱼泉河口，海拔415米。<br>气候：<br>柏杨坝镇属亚热带季风气候，其特点是冬无严寒，夏无酷暑。多年平均气温16.7℃，无霜期年平均232天，年平均降水量1300毫米。<br>水文：<br>柏杨坝镇境内主要河流梅子河，从南坪入境，由南而北在两河口入云阳，注入长江，境内河道长45.4千米。<br><br>              <b>🖼️ 图片：</b><br>         <img src="images/恩施土家族苗族自治州利川市柏杨坝镇水井村.png" style="max-width:200px;border:1px solid #ccc;border-radius:4px;"><br>         </div>`)[0];

            var html_c49ed8cc60b85cfe0f9d3898d2767c59 = $(`<div id="html_c49ed8cc60b85cfe0f9d3898d2767c59" style="width: 100.0%; height: 100.0%;">     <b>恩施土家族苗族自治州利川市毛坝镇山青村</b><br>     <b>⭐ 星级：</b> ⭐⭐⭐⭐⭐<br>     <b>🍃 茶种植：</b> 高山茶区<br>     <b>👥 民族文化：</b> 土家族<br>     <b>📞 联系方式：</b><br>毛坝镇人民政府<br>负责人姓名:郑文皓<br>办公时间:8:30--12:00,14:30--17:30(公休日除外，季节性办公时间调整见公告)<br>联系电话:0718-7780101<br>传真号码:0718-7780601<br>     <b>📝 描述：</b><br>山青村<br>位于利川城区东南。整村坐北朝南。唐崖河源流之一的溪流革腊溪(疙瘩溪)沿村自东向西流过。山青村海拔最高1400多米，最低800多米，沟壑纵深，森林覆盖率80％以上。古盐道顺溪流延展，联通川鄂。因盐道发展应运而生。<br>背靠麻山，左有马鞍山，右有燕子岩。有小地名如下：大河坝、董家坪、磨盘溪、刘家湾、岩脚、安家坡、燕子岩、革腊溪、里头河、竹园坪、椿树堡等。<br>居民：全村有10个村民小组，174户，主要姓氏有张、彭、袁、田、刘、游等，以土家族、苗族为主。<br>特色产业：茶叶、生漆、药材、楠竹等。<br>主要农产品：奇异果、紫色包心菜、杨桃、红苹果、黄绿苹果、甜菜、绿苹果、丰水梨<br>茶种：冷后浑、白茶、龙井43、中茶108等。<br>茶企：成立了山青、山韵、山新三家茶叶企业。同时，成立了利川市同学帮种植合作社和远富养殖合作社，发展种植和养殖业。<br>文化遗址：山青村在清代建村，是毛坝镇保存原始风貌最完整的村落之一。第三次全国文物普查新发现不可移动文物一处。全村现有清代刘家湾大院6000平方米，清代刘家湾古墓1000平方米，革腊溪6000平方米，有古树7处，古河道3处，古盐道3处，古墓3处。至2016年，山青村存有22栋保存完好的吊脚楼。村落建筑绝大部分分布在溪岸两侧，沿溪有一条青石板路。<br>特色传统工艺：剪纸艺术是山青村传承最为普遍的手工技艺，自清朝时承袭至今，题材广泛，花样繁多。利用楠竹造纸技术也是山青村传承的非物质文化遗产。毛坝造纸技艺起源于明朝，因当地盛产楠竹，故取之造纸。所造纸张因吸水性能良好被称之为“火纸”，被用于书写及卫生用品，目前为祭祀之用。2011年，毛坝造纸技艺被列入恩施州第三批州级非物质文化遗产名录。<br><br><br><br>              <b>🖼️ 图片：</b><br>         <img src="images/恩施土家族苗族自治州利川市毛坝镇山青村.png" style="max-width:200px;border:1px solid #ccc;border-radius:4px;"><br>         </div>`)[0];
